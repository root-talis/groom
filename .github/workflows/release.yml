name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Test, release, and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vX.X.X (for example, v0.1.0); got: $tag"
            exit 1
          fi

      - name: Verify README quick example matches examples/quick-example
        run: bash scripts/verify-quickstart-example.sh

      - name: Set crate versions from tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          for manifest in groom/Cargo.toml groom_macros/Cargo.toml; do
            sed -i "s/^version = \".*\"/version = \"${version}\"/" "$manifest"
          done
          sed -i "s/^groom = { version = \".*\", path = \"..\/groom\" }/groom = { version = \"${version}\", path = \"..\/groom\" }/" groom_macros/Cargo.toml
          echo "groom version: $(grep '^version = ' groom/Cargo.toml)"
          echo "groom_macros version: $(grep '^version = ' groom_macros/Cargo.toml)"
          echo "groom_macros groom dependency: $(grep '^groom = ' groom_macros/Cargo.toml)"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Install cargo tools
        run: cargo install cargo-expand --locked

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Run tests
        run: just test

      - name: Extract release notes from CHANGELOG.md
        run: |
          tag="${GITHUB_REF_NAME}"
          awk -v tag="$tag" '
            BEGIN { found=0; printed=0 }
            /^## v[0-9]+\.[0-9]+\.[0-9]+$/ {
              if (found) exit
              if ($0 == "## " tag) found=1
              next
            }
            found { printed=1; print }
            END { if (!printed) exit 1 }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog section found for ${tag}"
            exit 1
          fi
          echo "Release notes for ${tag}:"
          cat release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md

      - name: Publish groom to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p groom --allow-dirty

      - name: Publish groom_macros to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in $(seq 1 12); do
            if cargo publish -p groom_macros --allow-dirty; then
              exit 0
            fi
            echo "Waiting for groom to appear on crates.io (attempt ${attempt}/12)..."
            sleep 15
          done
          echo "Failed to publish groom_macros after 12 attempts"
          exit 1
