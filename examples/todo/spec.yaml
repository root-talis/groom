openapi: 3.1.0
info:
  title: TODO example (Groom)
  description: Shows how to structure backend with three-layer architecture and generate spec for frontend.
  contact:
    name: name
    email: mail@example.com
  license:
    name: MIT OR Apache-2.0
    identifier: MIT OR Apache-2.0
  version: 0.0.1
paths:
  /tasks:
    get:
      summary: Lists tasks
      operationId: listTasks
      parameters:
      - name: title
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: status
        in: query
        required: false
        schema:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/Status'
      - name: sort_by
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/TaskSortField'
      - name: order
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasksList'
        '500':
          description: ''
    post:
      summary: Adds a new task.
      operationId: addTask
      requestBody:
        description: Request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTaskRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddTaskRequest'
        required: true
      responses:
        '201':
          description: Task added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Malformed request, e.g. missing title or title is too long.
          content:
            application/json:
              schema:
                type: string
        '409':
          description: Task already exists with the same title
        '500':
          description: Unexpected error when adding a task, e.g. database is down or serialization error.
  /tasks/{task_id}:
    get:
      summary: Gets a single task.
      operationId: getTask
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: ''
        '500':
          description: ''
  /tasks/{task_id}/name:
    put:
      summary: Renames a task.
      operationId: renameTask
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 0
      requestBody:
        description: Request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameTaskRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RenameTaskRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: ''
          content:
            application/json:
              schema:
                type: string
        '404':
          description: ''
        '409':
          description: ''
        '500':
          description: ''
  /tasks/{task_id}/status/cancel:
    put:
      summary: Mark the task as cancelled.
      operationId: setCancelled
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: ''
        '409':
          description: Returned if the operation would result in a duplicated task in Pending status.
        '500':
          description: ''
  /tasks/{task_id}/status/done:
    put:
      summary: Mark the task as done.
      operationId: setDone
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: ''
        '409':
          description: Returned if the operation would result in a duplicated task in Pending status.
        '500':
          description: ''
  /tasks/{task_id}/status/pending:
    put:
      summary: Mark the task as pending.
      operationId: setPending
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: ''
        '409':
          description: Returned if the operation would result in a duplicated task in Pending status.
        '500':
          description: ''
components:
  schemas:
    AddTaskRequest:
      type: object
      description: Request body
      required:
      - title
      properties:
        title:
          type: string
    RenameTaskRequest:
      type: object
      description: Request body
      required:
      - title
      properties:
        title:
          type: string
    SortOrder:
      type: string
      enum:
      - asc
      - desc
    Status:
      type: string
      enum:
      - Pending
      - Done
      - Cancelled
    Task:
      type: object
      required:
      - id
      - title
      - status
      properties:
        id:
          type: integer
          format: int64
          minimum: 0
        status:
          $ref: '#/components/schemas/Status'
        title:
          type: string
    TaskSortField:
      type: string
      enum:
      - id
      - title
      - status
    TasksList:
      type: array
      items:
        $ref: '#/components/schemas/Task'
